<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>TALK TO US - MURUKALI RESTO</title>
	<link rel="stylesheet" type="text/css" href="styles.css">

</head>
<body>

<header>
		<a href="index.html"><img src="logo.png" alt="logo" id="logo"></a>
		<h1>
			MURUKALI RESTAURANT
		</h1>
		
		<nav>
			<a href="index.html">HOME</a>
			<a href="menu.html">MENU</a>
			<a href="contact.html">TALK TO US</a>
		</nav>

</header>
<main>
	<form>
		<fieldset>
			<legend>Leave a feedback!</legend>
			<label for="name">Full Name:</label>
			<input type="text" name="name" id="name" placeholder="Muhire Eric" required> <br>
			<label for="email">Email:</label>
			<input type="email" name="email" placeholder="rukali@gmail.com" required id="email"> <br>
			<label>How did you find our restaurant?</label> <br>
			<input type="radio" name="feedback" id="feed1" checked>
			<label for="feed1">Awesome</label> <br>
			<input type="radio" name="feedback" id="feed2">
			<label for="feed2">Good</label> <br>
			<input type="radio" name="feedback" id="feed3">
			<label for="feed3">Average</label> <br>
			<input type="radio" name="feedback" id="feed4">
			<label for="feed4">Not quite mentionable</label> <br>
			<label for="suggest">What do you suggest?</label> <br>
			<textarea id="suggest" name="suggestion" rows="4" cols="30"></textarea> <br>
			<button type="submit" id="submit">Submit</button>

		</fieldset>
	</form>
	
</main>

<footer>
	<div class="contact">
		<a href="https://instagram.com" target="_blank" class="ig"><img src="instagram.png"></a>
		<a href="https://youtube.com" target="_blank" class="yt"><img src="youtube.png"></a>
		<a href="https://facebook.com"target="_blank" class="fb"><img src="facebook.png"></a>
		<a href="https://tiktok.com" target="_blank" class="tik"><img src="tiktok.png"></a>
	</div>
	<p>Copyright &copy; MURUKALI RESTO 2026</p>
</footer>
</body>
</html>
